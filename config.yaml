# config.yaml
# Trader-Resp — RSI Mean-Reversion Screener + Backtest
#
# Every threshold in STRATEGY.md / CLAUDE-CODE-PROMPT.md lives here as a named
# key. No magic numbers in code. If a value changes, it changes here only.
#
# Keys marked "STAGE n" note which build stage first consumes them, so it's
# obvious which knobs are wired up vs. still just documented for later.

universe:
  # STAGE 1
  index_membership: ["SPY", "QQQ"]        # must be a constituent of one of these
  market_cap_shares_min: 10_000_000_000   # $10B
  market_cap_shares_max: 499_000_000_000  # $499B (Mag7 rule cutoff)
  market_cap_leap_min: 500_000_000_000    # $500B+ only — disqualifies NFLX
  price_min: 10                           # > $10
  avg_volume_min: 2_000_000               # > 2M shares/day

drawdown_gate:
  # TIERED (2026-07-20/21, owner-specified, ADOPTED 2026-07-21 as official
  # — was EXPERIMENTAL through the 2026-07-20 reopened-research run).
  # Replaces the flat 40%/25% gate entirely (archived in backtest/
  # drawdown_gate.py's rolling_high/gate_of, no longer called by default).
  # Required drawdown from the hybrid 2yr-high anchor, by market-cap tier
  # (CURRENT market cap — no point-in-time data available, flagged proxy,
  # same limitation as universe membership). No hard cap floor — smaller
  # names simply need a deeper drawdown, never excluded by cap alone (the
  # $10B quality-gate floor above still applies, separately, upstream).
  tier_500b_plus_pct: 0.25
  tier_150b_500b_pct: 0.30
  tier_under_150b_pct: 0.40
  tier_500b_breakpoint: 500_000_000_000
  tier_150b_breakpoint: 150_000_000_000

resampling:
  # STAGE 0
  bar_size_days: 3                        # 3 trading days per bar, non-overlapping
  # Anchor rule: groups are built from the start of the fetched daily history,
  # i.e. bar 1 = trading days [0,1,2], bar 2 = [3,4,5], etc. Documented in
  # screener/resample.py. This is the exact thing the MSFT/HIMS eyeball gate
  # is meant to catch if TradingView anchors differently.

indicators:
  # STAGE 0
  rsi_period: 14                          # RSI(14) on the 3-day chart — entry/exit signal.
                                           # Switched from RSI(3) — see docs/PLAN.md for the
                                           # validation gate and threshold re-tune evidence.
  rsi_method: "wilder"                    # Wilder's smoothing (RMA) — matches TradingView default
  # REMOVED FROM STRATEGY 2026-07-19 (owner override, Addendum 2): the
  # close > SMA(200) gate is removed from ALL strategy entry logic (A/C/D),
  # NOT kept as an ablation. SMA(200) may later be computed for display as
  # a dashboard visual only — it has no role in signal logic and is not
  # computed in the backtest signal path. Key kept for that future
  # display use only.
  sma_trend_period: 200
  atr_period: 14                          # ATR(14) — tranche ladder spacing

entry:
  # STAGE 2 (documented now per build spec, not consumed until Stage 2)
  # NOTE: the "rsi3_" key names are a leftover from the RSI(3) design and
  # are kept as-is rather than renamed, to avoid implying these numbers
  # have been re-validated for RSI(14). A re-tune (35/70/65/55) was
  # proposed on 2026-07-15 based on RSI(14) signal-frequency data alone —
  # NOT a backtest — and was explicitly rejected by the owner on
  # 2026-07-15: "never authorized... do not describe an un-backtested
  # change as evidence-backed again." Values below are the original
  # STRATEGY.md numbers and stay that way until an actual backtest
  # (not just signal-frequency counting) supports changing them.
  rsi3_buy_threshold: 35                  # RSI(3) < 35 triggers a look
  rsi3_grade_a_threshold: 30              # RSI(3) < 30 -> Grade A candidate
  weekly_lower_low_lookback_weeks: 8      # weekly chart "not making lower lows" lookback window

exit:
  # STAGE 3
  # Same caveat as entry: rsi3_* values are the original STRATEGY.md
  # numbers. The 2026-07-15 re-tune proposal was rejected (see entry: note
  # above) and is not reflected here.
  rsi3_euphoria_threshold: 80             # Trigger 1: RSI(3) >= 80 -> SELL
  rsi3_momentum_touch_threshold: 70       # Trigger 2 arm: RSI(3) touches >= 70
  rsi3_momentum_cross_below: 60           # Trigger 2 fire: then crosses back below 60
  exit_trim_position_pct_of_book: 0.25    # position > 25% of book ->
  exit_trim_target_pct_of_book: 0.20      #   trim to 20%, proceeds to cash
  exit_first_signal_sell_fraction: 0.50   # 1st exit signal within cap: sell 50%

sizing:
  # STAGE 2/3
  # CHANGED 2026-07-21 (owner override, "Real LEAP Pricing + Tiered Gate +
  # Tiebreak Fix"): 5 equity + 1 LEAP -> 4 equity + 1 LEAP. The 5th equity
  # slot's capital is now the dedicated LEAP reserve (see leap.reserve_pct
  # below) — max_slots is descriptive only, not separately enforced.
  max_slots: 5                            # 4 equity + 1 LEAP
  equity_slots: 4
  leap_slots: 1
  # CHANGED 2026-07-15 (owner override): 25% -> 20%. Applies to stocks AND
  # options — shares + LEAPs on same underlying = one bucket.
  # CHANGED AGAIN 2026-07-19 (owner override, LOCKED DECISIONS): 20% -> 15%
  # for equities. STRATEGY.md Part 6 still says 25%; doc drift tracked in
  # docs/PLAN.md override log.
  max_position_pct_of_book: 0.15
  max_tranches_per_name: 3                # hard cap — but single-entry is now
                                           # PRIMARY; the 3-tranche ladder is a
                                           # toggleable ablation variant only
  tranche_spacing_atr_multiple: 1.5       # 1.5 x ATR(14) below previous entry
  # CHANGED 2026-07-19 (owner override, LOCKED DECISIONS): 10% -> 5%.
  min_cash_floor_pct: 0.05

leap:
  # STAGE 2/3 (separate rule set from equities)
  market_cap_min: 500_000_000_000         # $500B+ underlying only
  # CHANGED 2026-07-19 (owner override, LOCKED DECISIONS): 0.70-0.80 ->
  # 0.50-0.60. CHANGED AGAIN 2026-07-21 (owner override): 0.50-0.60 ->
  # 0.55-0.65 (midpoint used to solve the modeled strike -> 0.60, was 0.55).
  # STRATEGY.md v2 said deep ITM 0.70-0.80; superseded, see STRATEGY.md v3.
  delta_min: 0.55
  delta_max: 0.65
  expiry_min_months: 18                   # at entry
  force_close_months_to_expiry: 6         # regardless of P/L — SUSPENDED for
                                           # the Fib strategy, see fib_* keys below
  iv_rank_skip_threshold: 60              # skip if IV rank > 60 -> buy shares instead
  # CHANGED 2026-07-21 (owner override, "dedicated LEAP reserve" model):
  # 25% -> 33%. Single-entry and total-sleeve caps are now IDENTICAL by
  # design — only ONE LEAP at a time, hard cap, no stacking, so "single"
  # and "total" collapse to the same number.
  sleeve_cap_pct_of_book: 0.33            # total LEAP sleeve (== single_entry, only 1 LEAP ever held)
  single_entry_pct_of_book: 0.33          # CHANGED 2026-07-21: 0.20 -> 0.33
  no_tranche_ladder: true                 # one entry, one exit — never average down an option
  # DEDICATED RESERVE (2026-07-21, owner's model): this 33% is RESERVED
  # capital, not backfilled into equities when no LEAP qualifies. See
  # backtest/constraints.py check_leap_reserve and STRATEGY.md Part 4a.
  # LIVE EXECUTION ONLY (never modeled in the backtest — the existing
  # SPY-idle-cash benchmark already captures the functionally identical
  # behavior): idle capital (this reserve + the 5% cash floor) is held in
  # VOO, not literal cash, and sold to fund entries. See STRATEGY.md.
  reserve_pct: 0.33
  # LATCHED-FIB STRATEGY (2026-07-19): entry rules for this strategy —
  # delta already above, 1.75yr expiry hard floor / 2yr preferred.
  # force_close_months_to_expiry (above) is SUSPENDED for this strategy
  # only; LEAPs ride to the Fib exit or modeled expiry.
  fib_entry_expiry_min_years: 1.75        # never enter a LEAP under this
  fib_modeled_expiry_years: 2.0           # "or expiry" exit horizon (preferred term);
                                           # ALSO the tenor T0 used to solve the modeled
                                           # strike at entry (backtest/leap_bs_pricing.py)

circuit_breakers:
  # STAGE 2/3
  max_new_positions_per_week: 2
  account_drawdown_halt_pct: 0.30         # -30% -> halt new entries
  halt_duration_days: 30

ut_bot:
  # BACKTEST COMPARISON (screener/ut_bot.py) — ported from the original
  # Pine v4 UT Bot Alerts script, computed on 3-day bars, Heikin Ashi OFF.
  key_value: 1.0                          # "a" — sensitivity multiplier on ATR
  atr_period: 10                          # "c" — ATR period for the trailing stop
  # Sweep ranges for parameter tuning (training window only, never the vault):
  key_value_sweep_min: 1.0
  key_value_sweep_max: 4.0
  key_value_sweep_step: 0.5
  atr_period_sweep_min: 7
  atr_period_sweep_max: 21
  atr_period_sweep_step: 3

strategy_c:
  # RSI-armed, UT-triggered (the owner's thesis). Arming/expiry are on
  # RSI(14), 3-day bars — separate from the entry.rsi3_* config above,
  # which governs Strategy A only.
  arm_touch_rsi_level: 35                 # RSI(14) touches <= this -> ARMED
  arm_expiry_rsi_level: 50                # RSI(14) reclaims this -> arm cancelled.
                                           # LOCKED 2026-07-19 (Addendum 2): this is
                                           # the ONLY expiry rule — no day cap, no
                                           # time-based backstop. Applies to C and D.

strategy_d:
  # RSI-armed, VOLUME-triggered. Entry: RSI(14) <= 35 arms; a volume
  # expansion bar (> multiplier x average volume) fires while armed; weekly
  # lower-lows filter must also pass. Arm/expiry levels shared with
  # strategy_c above (same arm state machine).
  volume_multiplier: 1.25                 # given in Addendum 2 (owner-specified)
  # ASSUMED — NOT CONFIRMED (2026-07-19): Addendum 1, which defined
  # Strategy D, never reached the Code session; the two values below are
  # reconstruction defaults flagged for owner veto, NOT owner-specified.
  volume_avg_bars: 20                     # average = trailing 20 bars on the
                                           # 3-day chart, prior bars only
                                           # (excludes the signal bar itself)
  volume_multiplier_sweep_min: 1.0        # sweep for D (training window only,
  volume_multiplier_sweep_max: 2.0        #  never the vault), same discipline
  volume_multiplier_sweep_step: 0.25      #  as the UT sweep above

backtest:
  # STAGE 6 (this comparison task runs on the owner's held names, not the
  # full SPY/QQQ universe — see docs/PLAN.md for the scope note)
  years: 5
  seed_cash: 100_000                      # starting book for every simulated run
  slippage_pct: 0.001                     # 0.1%
  split_half_boundary: "2024-01-01"       # 2021-2023 vs 2024-2026, reported separately
  vault_months: 6                         # most recent N months held out, tested once

data:
  # STAGE 0
  source: "robinhood_mcp"                 # sole data source — no yfinance fallback.
                                           # Cache is populated by the agent via the
                                           # Robinhood MCP tool; see screener/data.py.
  cache_dir: "data_cache"
  cache_format: "parquet"
